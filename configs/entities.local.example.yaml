# Example local entity file.
#
# Copy this to configs/entities.local.yaml for real project use.
# Do not commit configs/entities.local.yaml if it contains real customer names,
# internal system names, database names, or other sensitive identifiers.
#
# In configs/policy.yaml, enable it with:
#
# entity_files:
#   - entities.local.yaml

entities:
  - type: CLIENT
    pattern: "\\b(ExampleCustomer|AnotherCustomer)\\b"
    scope: prompt
  - type: INTERNAL_SERVICE
    pattern: "\\b(example-internal-api|example-worker)\\b"
    scope: prompt
