# Example local entity file.
#
# Copy this to .agent-privacy-guard/entities.local.yaml for real project use.
# Do not commit .agent-privacy-guard/entities.local.yaml if it contains real customer names,
# internal system names, database names, or other sensitive identifiers.
#
# In .agent-privacy-guard/policy.yaml, enable it with:
#
# entity_files:
#   - entities.local.yaml

entities:
  - type: CLIENT
    pattern: "\\b(ExampleCustomer|AnotherCustomer)\\b"
    scope: prompt
  - type: INTERNAL_SERVICE
    pattern: "\\b(example-internal-api|example-worker)\\b"
    scope: prompt
